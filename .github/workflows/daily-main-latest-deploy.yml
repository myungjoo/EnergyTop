name: Daily Main Build/Test + Latest Deploy

on:
  schedule:
    # 00:00 KST (UTC+9) == 15:00 UTC (previous day)
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: daily-main-latest-deploy
  cancel-in-progress: true

jobs:
  build-test-package:
    name: Build/Test/Package (${{ matrix.target.display }})
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - display: x64
            arch: x64
            runner: ubuntu-latest
          - display: arm64
            arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout main HEAD
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            libzmq3-dev \
            cppzmq-dev \
            libinih-dev \
            libgtest-dev \
            zlib1g-dev \
            libstdc++-14-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --verbose

      - name: Collect deliverables
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "publish/latest/${{ matrix.target.arch }}"
          installer_path="$(ls build/energytop-installer-${{ matrix.target.arch }}-*.sh)"

          cp build/energytop "publish/latest/${{ matrix.target.arch }}/energytop"
          cp build/energytopd "publish/latest/${{ matrix.target.arch }}/energytopd"
          cp energytop.ini "publish/latest/${{ matrix.target.arch }}/energytop.ini"

          cp "${installer_path}" "publish/latest/${{ matrix.target.arch }}/energytop-installer.sh"
          cp "${installer_path}" "publish/latest/energytop-installer-${{ matrix.target.arch }}.sh"

          tar -C "publish/latest/${{ matrix.target.arch }}" \
            -czf "publish/latest/energytop-${{ matrix.target.arch }}.tar.gz" \
            energytop energytopd energytop.ini

      - name: Upload deliverables
        uses: actions/upload-artifact@v4
        with:
          name: latest-${{ matrix.target.arch }}
          path: publish/latest
          if-no-files-found: error
          retention-days: 1

  deploy-latest:
    name: Deploy latest files
    runs-on: ubuntu-latest
    needs: build-test-package
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout main HEAD
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Download deliverables
        uses: actions/download-artifact@v4
        with:
          pattern: latest-*
          path: site/latest
          merge-multiple: true

      - name: Build site content
        shell: bash
        run: |
          set -euo pipefail

          MAIN_SHA="$(git rev-parse HEAD)"
          MAIN_SHORT_SHA="$(git rev-parse --short=8 HEAD)"
          BUILD_TIME_UTC="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          cat > site/latest/metadata.json <<EOF
          {
            "repository": "${GITHUB_REPOSITORY}",
            "source_branch": "main",
            "source_commit": "${MAIN_SHA}",
            "source_commit_short": "${MAIN_SHORT_SHA}",
            "build_time_utc": "${BUILD_TIME_UTC}",
            "trigger": "${GITHUB_EVENT_NAME}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_url": "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          }
          EOF

          (
            cd site/latest
            sha256sum \
              energytop-x64.tar.gz \
              energytop-arm64.tar.gz \
              energytop-installer-x64.sh \
              energytop-installer-arm64.sh \
              x64/energytop \
              x64/energytopd \
              arm64/energytop \
              arm64/energytopd \
              > SHA256SUMS
          )

          cat > site/index.html <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>EnergyTop latest build</title>
          </head>
          <body>
            <h1>EnergyTop latest build</h1>
            <p>Source: <code>main@${MAIN_SHORT_SHA}</code></p>
            <ul>
              <li><a href="./latest/energytop-installer-x64.sh">Installer (x64)</a></li>
              <li><a href="./latest/energytop-installer-arm64.sh">Installer (arm64)</a></li>
              <li><a href="./latest/energytop-x64.tar.gz">Binary archive (x64)</a></li>
              <li><a href="./latest/energytop-arm64.tar.gz">Binary archive (arm64)</a></li>
              <li><a href="./latest/x64/energytop">energytop binary (x64)</a></li>
              <li><a href="./latest/x64/energytopd">energytopd binary (x64)</a></li>
              <li><a href="./latest/arm64/energytop">energytop binary (arm64)</a></li>
              <li><a href="./latest/arm64/energytopd">energytopd binary (arm64)</a></li>
              <li><a href="./latest/SHA256SUMS">SHA256SUMS</a></li>
              <li><a href="./latest/metadata.json">metadata.json</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add summary
        run: |
          echo "## Latest deploy completed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source: main@$(git rev-parse --short=8 HEAD)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Page URL: ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
