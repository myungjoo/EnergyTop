name: Daily Main Build/Test + Latest Deploy

on:
  schedule:
    # 00:00 KST (UTC+9) == 15:00 UTC (previous day)
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-main-latest-deploy
  cancel-in-progress: true

jobs:
  build-test-package-linux:
    name: Build/Test/Package (${{ matrix.target.display }})
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - display: x64
            arch: x64
            runner: ubuntu-latest
          - display: arm64
            arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout main HEAD
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            libzmq3-dev \
            cppzmq-dev \
            libinih-dev \
            libgtest-dev \
            zlib1g-dev \
            libstdc++-14-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --verbose

      - name: Collect deliverables
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "publish/latest/${{ matrix.target.arch }}"
          installer_path="$(ls build/energytop-installer-${{ matrix.target.arch }}-*.sh)"

          cp build/energytop "publish/latest/${{ matrix.target.arch }}/energytop"
          cp build/energytopd "publish/latest/${{ matrix.target.arch }}/energytopd"
          cp energytop.ini "publish/latest/${{ matrix.target.arch }}/energytop.ini"
          cp build/energytop "publish/latest/energytop-${{ matrix.target.arch }}"
          cp build/energytopd "publish/latest/energytopd-${{ matrix.target.arch }}"

          cp "${installer_path}" "publish/latest/${{ matrix.target.arch }}/energytop-installer.sh"
          cp "${installer_path}" "publish/latest/energytop-installer-${{ matrix.target.arch }}.sh"

          tar -C "publish/latest/${{ matrix.target.arch }}" \
            -czf "publish/latest/energytop-${{ matrix.target.arch }}.tar.gz" \
            energytop energytopd energytop.ini

      - name: Upload deliverables
        uses: actions/upload-artifact@v4
        with:
          name: latest-${{ matrix.target.arch }}
          path: publish/latest
          if-no-files-found: error
          retention-days: 1

  build-package-android:
    name: Build/Package Android (${{ matrix.target.display }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - display: x64 (emulator)
            abi: x86_64
            arch: x64
          - display: arm64
            abi: arm64-v8a
            arch: arm64
    env:
      ANDROID_API: "30"
      ANDROID_NDK_VERSION: "27.1.12297006"
    steps:
      - name: Checkout main HEAD
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            file

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Cache Android third-party deps
        uses: actions/cache@v4
        with:
          path: .cache/android-deps/${{ matrix.target.abi }}
          key: android-deps-${{ matrix.target.abi }}-api${{ env.ANDROID_API }}-v1

      - name: Build Android third-party deps
        run: |
          scripts/ci/build_android_deps.sh \
            "${{ matrix.target.abi }}" \
            "${ANDROID_API}" \
            ".cache/android-deps/${{ matrix.target.abi }}"

      - name: Configure Android target
        run: |
          cmake -S . -B "build-android-${{ matrix.target.arch }}" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="${ANDROID_NDK_ROOT}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI="${{ matrix.target.abi }}" \
            -DANDROID_PLATFORM="android-${ANDROID_API}" \
            -DANDROID_STL="c++_static" \
            -DCMAKE_PREFIX_PATH="${GITHUB_WORKSPACE}/.cache/android-deps/${{ matrix.target.abi }}" \
            -DBUILD_TESTING=OFF

      - name: Build Android target
        run: cmake --build "build-android-${{ matrix.target.arch }}" --parallel

      - name: Verify Android ELF binaries
        run: |
          scripts/ci/verify_android_binary.sh \
            "build-android-${{ matrix.target.arch }}/energytop" \
            "${{ matrix.target.abi }}" \
            "${ANDROID_NDK_ROOT}"
          scripts/ci/verify_android_binary.sh \
            "build-android-${{ matrix.target.arch }}/energytopd" \
            "${{ matrix.target.abi }}" \
            "${ANDROID_NDK_ROOT}"

      - name: Collect Android deliverables
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "publish/latest/android-${{ matrix.target.arch }}"
          installer_path="$(ls build-android-${{ matrix.target.arch }}/energytop-installer-android-${{ matrix.target.arch }}-*.sh)"

          cp "build-android-${{ matrix.target.arch }}/energytop" \
            "publish/latest/android-${{ matrix.target.arch }}/energytop-android-${{ matrix.target.arch }}"
          cp "build-android-${{ matrix.target.arch }}/energytopd" \
            "publish/latest/android-${{ matrix.target.arch }}/energytopd-android-${{ matrix.target.arch }}"
          cp energytop.ini "publish/latest/android-${{ matrix.target.arch }}/energytop.ini"

          cp "build-android-${{ matrix.target.arch }}/energytop" \
            "publish/latest/energytop-android-${{ matrix.target.arch }}"
          cp "build-android-${{ matrix.target.arch }}/energytopd" \
            "publish/latest/energytopd-android-${{ matrix.target.arch }}"
          cp "${installer_path}" \
            "publish/latest/energytop-installer-android-${{ matrix.target.arch }}.sh"

          tar -C "publish/latest/android-${{ matrix.target.arch }}" \
            -czf "publish/latest/energytop-android-${{ matrix.target.arch }}.tar.gz" \
            "energytop-android-${{ matrix.target.arch }}" \
            "energytopd-android-${{ matrix.target.arch }}" \
            energytop.ini

      - name: Upload Android deliverables
        uses: actions/upload-artifact@v4
        with:
          name: latest-android-${{ matrix.target.arch }}
          path: publish/latest
          if-no-files-found: error
          retention-days: 1

  test-android-x64-emulator:
    name: Test Android x64 on emulator
    runs-on: ubuntu-latest
    needs: build-package-android
    steps:
      - name: Checkout main HEAD
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Download Android x64 deliverables
        uses: actions/download-artifact@v4
        with:
          name: latest-android-x64
          path: dist/latest

      - name: Prepare Android x64 dist
        run: |
          mkdir -p android-x64-dist
          cp dist/latest/energytop-android-x64 android-x64-dist/energytop-android-x64
          cp dist/latest/energytopd-android-x64 android-x64-dist/energytopd-android-x64
          cp dist/latest/energytop-installer-android-x64.sh android-x64-dist/energytop-installer-android-x64.sh
          cp dist/latest/android-x64/energytop.ini android-x64-dist/energytop.ini

      - name: Run Android x64 emulator smoke tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_5
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            bash scripts/ci/android_emulator_smoke_test.sh android-x64-dist

  deploy-latest:
    name: Publish latest files
    runs-on: ubuntu-latest
    needs:
      - build-test-package-linux
      - build-package-android
      - test-android-x64-emulator

    steps:
      - name: Checkout main HEAD
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Download deliverables
        uses: actions/download-artifact@v4
        with:
          pattern: latest-*
          path: dist/latest
          merge-multiple: true

      - name: Build metadata
        shell: bash
        run: |
          set -euo pipefail

          MAIN_SHA="$(git rev-parse HEAD)"
          MAIN_SHORT_SHA="$(git rev-parse --short=8 HEAD)"
          BUILD_TIME_UTC="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          cat > dist/latest/metadata.json <<EOF
          {
            "repository": "${GITHUB_REPOSITORY}",
            "source_branch": "main",
            "source_commit": "${MAIN_SHA}",
            "source_commit_short": "${MAIN_SHORT_SHA}",
            "build_time_utc": "${BUILD_TIME_UTC}",
            "trigger": "${GITHUB_EVENT_NAME}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_url": "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          }
          EOF

          (
            cd dist/latest
            sha256sum \
              energytop-x64.tar.gz \
              energytop-arm64.tar.gz \
              energytop-android-x64.tar.gz \
              energytop-android-arm64.tar.gz \
              energytop-installer-x64.sh \
              energytop-installer-arm64.sh \
              energytop-installer-android-x64.sh \
              energytop-installer-android-arm64.sh \
              energytop-x64 \
              energytopd-x64 \
              energytop-arm64 \
              energytopd-arm64 \
              energytop-android-x64 \
              energytopd-android-x64 \
              energytop-android-arm64 \
              energytopd-android-arm64 \
              > SHA256SUMS
          )

          cat > dist/latest/release-notes.md <<EOF
          Automated latest build from main.

          - Source commit: \`${MAIN_SHA}\`
          - Build time (UTC): \`${BUILD_TIME_UTC}\`
          - Trigger: \`${GITHUB_EVENT_NAME}\`
          - Workflow run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF

      - name: Create or update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: EnergyTop latest build
          body_path: dist/latest/release-notes.md
          files: |
            dist/latest/energytop-installer-x64.sh
            dist/latest/energytop-installer-arm64.sh
            dist/latest/energytop-installer-android-x64.sh
            dist/latest/energytop-installer-android-arm64.sh
            dist/latest/energytop-x64.tar.gz
            dist/latest/energytop-arm64.tar.gz
            dist/latest/energytop-android-x64.tar.gz
            dist/latest/energytop-android-arm64.tar.gz
            dist/latest/energytop-x64
            dist/latest/energytopd-x64
            dist/latest/energytop-arm64
            dist/latest/energytopd-arm64
            dist/latest/energytop-android-x64
            dist/latest/energytopd-android-x64
            dist/latest/energytop-android-arm64
            dist/latest/energytopd-android-arm64
            dist/latest/metadata.json
            dist/latest/SHA256SUMS
          fail_on_unmatched_files: true
          overwrite_files: true

      - name: Add summary
        run: |
          echo "## Latest release published" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source: main@$(git rev-parse --short=8 HEAD)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Release: https://github.com/${GITHUB_REPOSITORY}/releases/tag/latest-build" >> "$GITHUB_STEP_SUMMARY"
