name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and test (${{ matrix.target.display }})
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - display: x64
            runner: ubuntu-latest
          - display: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            libzmq3-dev \
            cppzmq-dev \
            libinih-dev \
            libgtest-dev \
            zlib1g-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test (PowerStats regression first)
        run: ctest --test-dir build --output-on-failure --verbose -R unit_power_stats

      - name: Test (all)
        run: ctest --test-dir build --output-on-failure --verbose
